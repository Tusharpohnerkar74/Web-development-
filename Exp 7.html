<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML Link Tags Demo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f5f5f5;
        }

        h1 {
            color: #333;
            border-bottom: 2px solid #ddd;
            padding-bottom: 10px;
        }

        h3 {
            color: #555;
            margin-top: 25px;
        }

        a {
            color: #0066cc;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
            color: #003d7a;
        }

        img {
            border: 1px solid #ddd;
            padding: 5px;
            background: white;
        }

        #section2 {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 5px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <h1>HTML Link Tags Demonstration</h1>

    <h3>1. External Link</h3>
    <a href="https://www.google.com" target="_blank">Visit Google</a>

    <h3>2. Internal Link</h3>
    <a href="#section2">Go to Section 2</a>

    <h3>3. Email Link</h3>
    <a href="mailto:tusharpohnerkar74@gmail.com">Send Email</a>

    <h3>4. Phone Link</h3>
    <a href="tel:+919876543210">Call Us</a>

    <h3>5. Image Link</h3>
    <a href="https://www.wikipedia.org" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/63/Wikipedia-logo.png" width="120" alt="Wikipedia">
    </a>

    <div id="section2">
        <h2>Section 2</h2>
        <p>This section is opened using an internal link.</p>
    </div>
</body>
</html>
